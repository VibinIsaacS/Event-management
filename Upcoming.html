<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Events</title>
  <link rel="stylesheet" href="Past events.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <video class="video-bg" autoplay muted loop>
    <source src="./eventblurred.mp4" type="video/mp4">
  </video>

  <div id="header-placeholder"></div>

  <main>
    <div id="upcoming-events-container">
      <!-- Upcoming event cards will be inserted here by JavaScript -->
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
  <script src="appwrite-config.js"></script>
  <script src="navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const eventsContainer = document.getElementById('upcoming-events-container');
      let currentUserId = null;

      try {
        const user = await account.get();
        currentUserId = user.$id;
      } catch (error) {
        // User is not logged in, currentUserId remains null
      }

      try {
        const response = await databases.listDocuments(DATABASE_ID, EVENTS_COLLECTION_ID);
        const allEvents = response.documents;
        const now = new Date();

        const upcomingEvents = allEvents
          .filter(event => new Date(event.datetime) >= now)
          .sort((a, b) => new Date(a.datetime) - new Date(b.datetime));

        if (upcomingEvents.length === 0) {
          eventsContainer.innerHTML = '<p class="no-events-message">No upcoming events to display.</p>';
          return;
        }

        eventsContainer.innerHTML = ''; // Clear the container

        upcomingEvents.forEach(event => {
          const eventCard = document.createElement('div');
          eventCard.className = 'glass-card';

          const imageUrl = event.posterFileId
            ? storage.getFileView(EVENTS_POSTERS_BUCKET_ID, event.posterFileId)
            : 'https://placehold.co/400x260/1a1a1a/ffffff?text=No+Image';
            
          let eventDate = 'Date not specified';
          if (event.datetime) {
              const dateObj = new Date(event.datetime);
              if (!isNaN(dateObj.getTime())) {
                  eventDate = dateObj.toLocaleString('en-US', {
                      dateStyle: 'medium',
                      timeStyle: 'short'
                  });
              }
          }

          let editButtonHTML = '';
          if (currentUserId && currentUserId === event.userId) {
            editButtonHTML = `<a href="Edit Event.html?id=${event.$id}" class="edit-btn">Edit Event</a>`;
          }

          eventCard.innerHTML = `
            <img src="${imageUrl}" alt="Event Poster" class="card-image">
            <div class="card-content">
              <h1>${event.name || 'Untitled Event'}</h1>
              <p><strong>When:</strong> ${eventDate}</p>
              <p><strong>Where:</strong> ${event.location || 'N/A'}</p>
              <!-- This line was missing -->
              <p class="organizer"><strong>Organizer:</strong> ${event.organizerName || 'N/A'} (${event.organizerContact || 'N/A'})</p>
              <p>${event.description || 'No description provided.'}</p>
              ${editButtonHTML}
            </div>
          `;
          eventsContainer.appendChild(eventCard);
        });

      } catch (error) {
        console.error('Failed to fetch upcoming events:', error);
        eventsContainer.innerHTML = '<p class="error-message">Could not load upcoming events.</p>';
      }
    });
  </script>
</body>
</html>
