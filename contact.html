<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <!-- We can reuse the login.css styles for this form -->
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="navbar.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <video class="video-bg" autoplay muted loop>
    <source src="./eventblurred.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  
  <!-- 
    This form uses the "login-form" class from login.css to keep the style consistent.
    It's set up to open the user's default email client.

    !!! IMPORTANT !!!
    Replace "YOUR_EMAIL@example.com" with your actual email address.
  -->
  <form 
    class="login-form" 
    action="mailto:vibinisaac1@gmail.com" 
    method="post" 
    enctype="text/plain"
  >
    <h2>Contact Us</h2>
    
    <div class="input-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="Name" placeholder="Enter your name" required>
    </div>
    
    <div class="input-group">
      <label for="email">Your Email</label>
      <input type="email" id="email" name="Email" placeholder="Enter your email" required>
    </div>

    <div class="input-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="Subject" placeholder="What is this about?" required>
    </div>

    <div class="input-group">
      <label for="message">Message</label>
      <textarea 
        id="message" 
        name="Message" 
        rows="5" 
        placeholder="Enter your message" 
        required 
        style="width: 100%; padding: 12px 16px; border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.18); color: #fff; font-size: 1rem; outline: none; box-shadow: 0 2px 12px 0 #fff2; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); font-family: 'Poppins', sans-serif; resize: vertical;"
      ></textarea>
    </div>
    
    <button type="submit">Send Message</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
  <script src="appwrite-config.js"></script>
  <!-- This closing tag has been fixed -->
  <script src="navbar.js"></script>
</body>
</html>
