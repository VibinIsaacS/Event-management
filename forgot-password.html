<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Using login.css for consistent styling -->
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="navbar.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <video class="video-bg" autoplay muted loop>
    <source src="./eventblurred.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  
  <form class="login-form" id="forgotPasswordForm">
    <h2>Forgot Password</h2>
    <p id="message" style="color: white; text-align: center; min-height: 1.2em; line-height: 1.4;"></p>
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
    </div>
    <button type="submit">Send Reset Link</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
  <script src="appwrite-config.js"></script>
  <script src="navbar.js"></script>
  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const messageEl = document.getElementById('message');
      const email = document.getElementById('email').value;
      const submitButton = event.target.querySelector('button');
      
      messageEl.textContent = 'Sending...';
      submitButton.disabled = true;

      try {
        // --- !! IMPORTANT !! ---
        // Replace 'https://YOUR_NETLIFY_SITE.netlify.app' with your actual website URL
        const resetUrl = 'https://planiteventss.netlify.app/reset-password.html';
        
        await account.createRecovery(email, resetUrl);
        
        messageEl.style.color = '#b8f28a'; // Green success color
        messageEl.textContent = 'Success! Please check your email for a password reset link.';
        
      } catch (error) {
        console.error('Failed to send recovery email:', error);
        messageEl.style.color = 'red';
        messageEl.textContent = error.message;
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
