<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <!-- Using signup.css for consistent styling -->
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="navbar.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <video class="video-bg" autoplay muted loop>
    <source src="./eventblurred.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  
  <form class="signup-form" id="resetPasswordForm">
    <h2>Set New Password</h2>
    <p id="message" style="color: white; text-align: center; min-height: 1.2em; line-height: 1.4;"></p>
    
    <div class="input-group">
      <label for="password">New Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your new password" required>
    </div>
    <div class="input-group">
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your new password" required>
    </div>
    <button type="submit">Reset Password</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
  <script src="appwrite-config.js"></script>
  <script src="navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const resetForm = document.getElementById('resetPasswordForm');
      const messageEl = document.getElementById('message');
      
      // Get the secret and userId from the URL
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('userId');
      const secret = params.get('secret');

      if (!userId || !secret) {
        messageEl.style.color = 'red';
        messageEl.textContent = 'Invalid reset link. Please request a new one.';
        resetForm.querySelector('button').disabled = true;
        return;
      }

      resetForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const submitButton = event.target.querySelector('button');

        if (password !== confirmPassword) {
          messageEl.style.color = 'red';
          messageEl.textContent = 'Passwords do not match!';
          return;
        }

        messageEl.textContent = 'Resetting...';
        submitButton.disabled = true;

        try {
          await account.updateRecovery(userId, secret, password, confirmPassword);
          
          messageEl.style.color = '#b8f28a'; // Green success color
          messageEl.textContent = 'Password reset successfully! Redirecting to login...';
          
          // Redirect to login after a short delay
          setTimeout(() => {
            window.location.href = 'Login.html';
          }, 3000);

        } catch (error) {
          console.error('Failed to reset password:', error);
          messageEl.style.color = 'red';
          messageEl.textContent = error.message;
          submitButton.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
